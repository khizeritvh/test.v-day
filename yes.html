<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You said yes 🌸</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="petal-bg" id="petalBg"></div>

    <div class="container yes-container">
        <p class="eyebrow">i had a feeling 🎀</p>
        <h1 class="yes-title">You said yes! 🎉</h1>

        <div class="gif-container">
            <div class="gif-frame">
                <img id="cat-gif"
                    src="https://media1.giphy.com/media/fSEoD7tXf6esHkpwpN/giphy.gif"
                    alt="celebrating">
            </div>
        </div>

        <p class="yes-message">You just made me the happiest person in the world 💕</p>
    </div>

    <audio id="bg-music" loop>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>
    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="yes-script.js"></script>
</body>
</html>
