<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you be mine? 🌸</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="petal-bg" id="petalBg"></div>

    <div class="container">
        <p class="eyebrow">a little something for you</p>
        <h1>Will you be mine? 🌸</h1>

        <div class="gif-container">
            <div class="gif-frame">
                <img id="cat-gif"
                    src="https://media1.giphy.com/media/fSEoD7tXf6esHkpwpN/giphy.gif"
                    alt="cute character">
            </div>
        </div>

        <div class="buttons">
            <button id="yes-btn" onclick="handleYesClick()">Yes, always 🌸</button>
            <button id="no-btn" onclick="handleNoClick()">No</button>
        </div>
        <div id="tease-toast"></div>
    </div>

    <audio id="bg-music" loop autoplay muted>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>
    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>

    <script src="script.js"></script>
</body>
</html>
