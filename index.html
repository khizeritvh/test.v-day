<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Question For You 🌹</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="container">
        <p class="eyebrow">a little question…</p>
        <h1>Will you be my Valentine? 🥀</h1>
        <div class="gif-container">
            <div class="gif-frame">
                <img id="cat-gif" src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExN2lrYTltc3ozazBxZ242aWwzMnJmZjFmb3RqamRteHJ1ZHZoc2xyciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/hqNj4dWVgKhUi5Ly3C/giphy.gif" alt="cute character">
            </div>
        </div>
        <div class="buttons">
            <button id="yes-btn" onclick="handleYesClick()">Yes, always 💗</button>
            <button id="no-btn" onclick="handleNoClick()">No</button>
        </div>
        <div id="tease-toast"></div>
    </div>
    <audio id="bg-music" loop autoplay muted>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>
    <button id="music-toggle" onclick="toggleMusic()" title="Toggle music">🔊</button>
    <script src="script.js"></script>
</body>
</html>
